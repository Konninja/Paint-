services:
  - type: web
    name: osint-spectre
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SHODAN_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: DEHASHED_EMAIL
        sync: false
      - key: DEHASHED_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
