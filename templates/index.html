<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsintSpectre — Reconnaissance Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>OsintSpectre</h1>
            <p class="subtitle">Reconnaissance Engine v3.0</p>
            <div class="nav-links">
                <a class="active" data-tab="dashboard">Dashboard</a>
                <a data-tab="history">History</a>
                <a data-tab="export">Export</a>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="card">
                    <h3>API Status</h3>
                    <div id="apiStatus">
                        <div class="api-item"><span>Shodan</span><span class="api-dot offline" id="dot-shodan"></span></div>
                        <div class="api-item"><span>Hunter.io</span><span class="api-dot offline" id="dot-hunter"></span></div>
                        <div class="api-item"><span>Dehashed</span><span class="api-dot offline" id="dot-dehashed"></span></div>
                        <div class="api-item"><span>VirusTotal</span><span class="api-dot offline" id="dot-virustotal"></span></div>
                    </div>
                </div>

                <div class="card">
                    <h3>Query Types</h3>
                    <div class="query-grid">
                        <button class="query-btn" data-type="email">Email</button>
                        <button class="query-btn" data-type="username">Username</button>
                        <button class="query-btn" data-type="phone">Phone</button>
                        <button class="query-btn" data-type="domain">Domain</button>
                        <button class="query-btn" data-type="ip">IP</button>
                    </div>
                </div>

                <div class="card" id="historyPanel">
                    <h3>Recent Queries</h3>
                    <div class="history-list" id="historyList">
                        <div style="color:#3a4a6a; font-size:0.85em; text-align:center; padding:20px;">
                            No queries yet
                        </div>
                    </div>
                </div>
            </aside>

            <main class="work-area">
                <div class="status-bar" id="statusBar" style="display:none;">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="statusText">Ready</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-row">
                        <span class="query-type-label" id="queryLabel">Email</span>
                        <input type="text" id="queryInput" placeholder="Enter target...">
                        <button id="searchBtn">Search</button>
                    </div>
                </div>

                <div class="results-area" id="resultsArea">
                    <div class="placeholder" id="placeholder">
                        <div class="placeholder-icon">🔎</div>
                        <p>Results will appear here with full intelligence data</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js')
